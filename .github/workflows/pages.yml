name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp asset versions for cache busting
        # Replaces the __BUILD__ placeholder in asset URLs with the commit
        # SHA, so browsers re-fetch JS/CSS after every deploy instead of
        # serving a stale cached mix of old and new files.
        run: sed -i "s/__BUILD__/${GITHUB_SHA::7}/g" index.html js/app.js
      - uses: actions/configure-pages@v5
        with:
          # Creates the Pages site on first run, so no manual setup is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          # The app is a static site at the repo root — no build step.
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
